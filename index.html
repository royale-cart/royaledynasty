<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royale Dynasty | Boutique Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Logo aur Text ki alignment ke liye CSS */
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-logo img {
            height: 40px; /* Isay tum apne logo ke size ke hisaab se adjust kar sakte ho */
            width: auto;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-brand">
            <span class="royale">Royale</span>
            <span class="dynasty">DYNASTY</span>
        </div>
        <div class="loader-pulse"></div>
    </div>

    <nav class="navbar">
        <div class="nav-content">
            <div class="brand-logo">
                <img src="images/logo.png" alt="Royale Dynasty Logo">
                
                <span class="royale-text">Royale</span>
                <span class="dynasty-text">DYNASTY</span>
            </div>
            <div class="search-wrapper">
                <input type="text" id="search-bar" placeholder="Search collection...">
            </div>
        </div>
    </nav>

    <section class="filter-section">
        <div id="category-filters" class="filters"></div>
    </section>

    <main class="container">
        <div id="product-grid" class="grid"></div>
        <div id="no-results" class="hidden">No items found.</div>
    </main>

    <div id="product-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button id="close-modal-icon" class="close-btn">&times;</button>
            <div class="modal-image-container">
                <img id="modal-img" src="" alt="Product">
            </div>
            <div class="modal-details">
                <span id="modal-category" class="category-tag"></span>
                <h2 id="modal-title"></h2>
                <p id="modal-desc"></p>
                <div class="modal-actions">
                    <button id="whatsapp-btn" class="btn primary-btn">Order via WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
